<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bedtime Routine Timer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#176ee8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Bedtime Routine">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="timer-shell" aria-label="bedtime timer">
      <section class="hero" aria-label="Bedtime dash scene">
        <img class="hero-image active" data-scene="start" src="assets/bedtime-dash.png" alt="A raccoon bedtime buddy ready for a bedtime dash">
        <img class="hero-image" data-scene="brush-teeth" src="assets/bedtime-brush-teeth.png" alt="A raccoon bedtime buddy brushing teeth before bed">
        <img class="hero-image" data-scene="pjs" src="assets/bedtime-pjs.png" alt="A raccoon bedtime buddy putting on pajamas before bed">
        <img class="hero-image" data-scene="storybook" src="assets/bedtime-storybook.png" alt="Two raccoons reading a storybook together beside a teddy bear">
        <img class="hero-image" data-scene="prayer" src="assets/bedtime-prayer.png" alt="A raccoon bedtime buddy praying in bed beside a teddy bear">
        <img class="hero-image" data-scene="head-pillow" src="assets/bedtime-head-pillow.png" alt="A raccoon bedtime buddy asleep with a teddy bear and covers pulled up">
        <img class="hero-image" data-scene="custom-task" src="assets/bedtime-custom-task.png" alt="A raccoon bedtime buddy ready for another bedtime task">
        <div class="sky-tint"></div>
        <div class="scene-message" id="sceneMessage" aria-live="polite"></div>
        <div class="goodnight" id="goodnightText" aria-hidden="true">GOODNIGHT!</div>
        <div class="sticker-chart" id="stickerChart" aria-live="polite" aria-label="Bedtime sticker chart"></div>
      </section>

      <header class="app-header">
        <div class="title-block">
          <p class="child-name" id="childName" contenteditable="true" spellcheck="false" aria-label="Editable child name">Insert Child's Name Here</p>
          <h1>Bedtime Routine</h1>
        </div>

        <button class="primary" id="startPause" type="button">START</button>

        <div class="timer-block">
          <p class="eyebrow" id="timerLabel" aria-hidden="true"></p>
          <div class="countdown" aria-label="Time remaining">
            <span id="minutes">20</span><span aria-hidden="true">:</span><span id="seconds">00</span>
          </div>
        </div>

        <div class="progress-wrap" aria-label="Bedtime progress">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
            <div class="runner" id="runner" aria-hidden="true"></div>
          </div>
        </div>
      </header>

      <section class="task-strip" id="taskStrip" aria-label="Bedtime checklist"></section>

      <p class="status" id="statusText" aria-live="polite">Ready for a calm bedtime race.</p>

      <section class="parent-controls" aria-label="Parent controls">
        <button class="parent-toggle" id="parentToggle" type="button" aria-expanded="false" aria-label="Parent controls">•••</button>
        <div class="parent-menu" id="parentMenu" hidden>
          <button class="parent-close" id="parentClose" type="button" aria-label="Close parent controls">×</button>
          <label for="durationInput">Timer minutes</label>
          <input id="durationInput" type="number" min="1" max="45" step="1" value="20">
          <button id="addTask" type="button">Add task</button>
          <button id="pauseResume" type="button">Pause</button>
          <button id="reset" type="button">Reset</button>
          <button id="voiceToggle" type="button" aria-pressed="true">Voice on</button>
          <button id="quiet" type="button" aria-pressed="true">Sound on</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
